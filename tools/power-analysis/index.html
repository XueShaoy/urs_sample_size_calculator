    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #141a22;
            --bg-tertiary: #1c242e;
            --bg-card: #151c25;
            --border-color: #2a3441;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --shadow: 0 4px 32px rgba(0,0,0,0.5);
            --glow-blue: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; line-height: 1.7;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
                              radial-gradient(ellipse at 90% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }

        .scenario-switch {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            display: flex; background: var(--bg-secondary); border-radius: 12px;
            padding: 4px; border: 1px solid var(--border-color); box-shadow: var(--shadow);
        }
        .scenario-btn {
            padding: 10px 18px; border: none; background: transparent;
            color: var(--text-secondary); font-size: 0.85rem; font-family: inherit;
            cursor: pointer; border-radius: 8px; transition: all 0.25s;
            display: flex; align-items: center; gap: 8px; font-weight: 500;
        }
        .scenario-btn.active { background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan)); color: white; }
        .scenario-btn.active.ab { background: linear-gradient(135deg, var(--accent-orange), var(--accent-red)); }
        .scenario-btn:hover:not(.active) { background: var(--bg-tertiary); color: var(--text-primary); }

        .home-link {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px;
            border-radius: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color);
            box-shadow: var(--shadow); color: var(--text-secondary); font-size: 0.85rem;
            font-weight: 500; text-decoration: none; transition: all 0.25s;
        }
        .home-link:hover { color: var(--text-primary); border-color: var(--accent-blue); box-shadow: var(--glow-blue); }

        header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
        h1 {
            font-size: 2.25rem; font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-secondary); font-size: 1rem; }
        .scenario-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 500; margin-top: 12px;
        }
        .scenario-badge.monitoring { background: rgba(16,185,129,0.15); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.3); }
        .scenario-badge.ab-test { background: rgba(245,158,11,0.15); color: var(--accent-orange); border: 1px solid rgba(245,158,11,0.3); }

        .card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px;
            padding: 32px; margin-bottom: 24px; position: relative;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), transparent);
        }
        .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .card-icon.green { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(6,182,212,0.2)); }
        .card-title { font-size: 1.15rem; font-weight: 600; }
        .card-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
        label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

        .tooltip { position: relative; cursor: help; color: var(--accent-cyan); display: inline-flex; }
        .tooltip::after {
            content: attr(data-tip); position: absolute;
            bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--bg-primary); color: var(--text-primary);
            padding: 12px 16px; border-radius: 10px; font-size: 0.75rem; font-weight: 400;
            opacity: 0; visibility: hidden; transition: all 0.15s; z-index: 99999;
            border: 1px solid var(--border-color); width: 240px;
            white-space: normal; text-align: left; line-height: 1.6;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); pointer-events: none;
        }
        .tooltip:hover::after { opacity: 1; visibility: visible; }
        .tooltip.tip-down::after { bottom: auto; top: calc(100% + 8px); }

        input[type="number"], select {
            background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 10px;
            padding: 12px 16px; color: var(--text-primary); font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace; width: 100%;
        }
        select { font-family: 'Noto Sans SC', sans-serif; cursor: pointer; }
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        input::placeholder { color: var(--text-muted); }

        .btn {
            padding: 14px 32px; border: none; border-radius: 12px; font-size: 0.95rem;
            font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.25s;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--glow-blue); }
        .action-row { display: flex; gap: 14px; margin-top: 28px; justify-content: flex-end; }

        .results-section { display: none; }
        .results-section.visible { display: block; animation: fadeIn 0.3s ease; margin-top: 32px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Validation */
        .validation-banner {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 12px; padding: 14px 18px; margin-top: 20px;
            font-size: 0.85rem; color: var(--accent-red); line-height: 1.6;
        }
        .validation-banner[hidden] { display: none; }
        .field-error-msg { font-size: 0.75rem; color: var(--accent-red); margin-top: 4px; display: block; }
        input.input-error, select.input-error { border-color: var(--accent-red) !important; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15) !important; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px 22px; }
        .stat-label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.6rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent-cyan); }
        .stat-value.warn { color: var(--accent-orange); }
        .stat-value.good { color: var(--accent-green); }
        .stat-unit { font-size: 0.85rem; color: var(--text-secondary); margin-left: 4px; font-family: inherit; font-weight: 400; }
        .stat-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-wrap { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; }
        .chart-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
        .chart-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 16px; min-height: 18px; }
        .chart-wrap svg { width: 100%; height: auto; display: block; }
        .chart-empty { display: flex; align-items: center; justify-content: center; height: 180px; color: var(--text-muted); font-size: 0.85rem; }
        .chart-interactive { position: relative; }
        .chart-hit-area { cursor: crosshair; }
        .chart-crosshair { pointer-events: none; }
        .chart-tooltip {
            position: absolute; pointer-events: none; z-index: 2;
            padding: 8px 12px; border-radius: 8px;
            background: var(--bg-tertiary); border: 1px solid var(--border-color);
            box-shadow: var(--shadow); font-size: 0.78rem; line-height: 1.5;
            opacity: 0; transition: opacity 0.12s; white-space: nowrap;
        }
        .chart-tooltip.visible { opacity: 1; }
        .chart-tooltip-day { color: var(--text-secondary); margin-bottom: 2px; }
        .chart-tooltip-value { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

        .formula-section { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px 24px; margin-top: 24px; }
        .formula-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 500; }
        .formula-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 2; }

        .traffic-mode-row { display: none; align-items: center; gap: 12px; margin-bottom: 20px; }
        .traffic-mode-row.visible { display: flex; }
        .traffic-mode-label { font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; }
        .mode-tabs { display: flex; background: var(--bg-secondary); border-radius: 8px; padding: 3px; border: 1px solid var(--border-color); }
        .mode-tab { padding: 6px 14px; border: none; background: transparent; color: var(--text-secondary); font-size: 0.8rem; font-family: inherit; cursor: pointer; border-radius: 5px; transition: all 0.2s; font-weight: 500; }
        .mode-tab.active { background: var(--bg-tertiary); color: var(--text-primary); }

        @media (max-width: 768px) {
            .scenario-switch { top: 56px; left: 10px; right: 10px; justify-content: center; }
            .home-link { top: 14px; right: 10px; padding: 8px 12px; font-size: 0.78rem; }
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>

<body>
    <button class="watermark" id="changelog-watermark" onclick="openChangelog()" title="点击查看更新日志">URS数据科学团队 © 2026</button>

    <div class="changelog-overlay" id="changelog-overlay" onclick="closeChangelogOnOverlay(event)">
        <div class="changelog-modal" role="dialog" aria-labelledby="changelog-title">
            <div class="changelog-header">
                <span class="changelog-title" id="changelog-title">📋 更新日志</span>
                <button class="changelog-close" onclick="closeChangelog()" aria-label="关闭">✕</button>
            </div>
            <div class="changelog-body" id="changelog-body"></div>
        </div>
    </div>

    <div class="scenario-switch">
        <button class="scenario-btn active" data-scenario="monitoring" onclick="switchScenario('monitoring')">📈 长期观测</button>
        <button class="scenario-btn" data-scenario="ab-test" onclick="switchScenario('ab-test')">🧪 AB 测试</button>
    </div>
    <a class="home-link" href="../../index.html">← 返回首页</a>

    <div class="container">
        <header>
            <h1>功效分析</h1>
            <p class="subtitle">分析统计功效如何随实验天数增长，确定实验的最优时长</p>
            <div class="scenario-badge monitoring" id="scenario-badge">📈 长期观测</div>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="card-icon green">⚙️</div>
                <div>
                    <div class="card-title">实验参数</div>
                    <div class="card-desc">填写实验流量与效应量，分析功效随时间的变化趋势</div>
                </div>
            </div>

            <div class="traffic-mode-row" id="traffic-mode-row">
                <span class="traffic-mode-label">AB 流量输入方式</span>
                <div class="mode-tabs">
                    <button class="mode-tab active" id="tab-ratio" onclick="setTrafficMode('ratio')">总量 + 比例</button>
                    <button class="mode-tab" id="tab-direct" onclick="setTrafficMode('direct')">分组直接输入</button>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group" id="daily-n-group">
                    <label>
                        日均流量
                        <span class="tooltip tip-down" data-tip="每天进入实验的用户总数。AB 测试中按分流比例分配给对照组与实验组。">ⓘ</span>
                    </label>
                    <input type="number" id="daily-n" min="1" step="1" placeholder="e.g. 10000">
                </div>
                <div class="form-group" id="split-group" style="display:none">
                    <label>
                        分流比例 (A : B)
                        <span class="tooltip tip-down" data-tip="对照组与实验组的流量分配比例。1:1 表示等比例分流；1:2 表示实验组流量是对照组的两倍。非等比分流会降低统计效率，需要更多总样本量。">ⓘ</span>
                    </label>
                    <select id="split-ratio">
                        <option value="1:1" selected>1 : 1</option>
                        <option value="1:2">1 : 2</option>
                        <option value="1:3">1 : 3</option>
                        <option value="1:4">1 : 4</option>
                        <option value="2:1">2 : 1</option>
                        <option value="3:1">3 : 1</option>
                        <option value="4:1">4 : 1</option>
                    </select>
                </div>
                <div class="form-group" id="daily-na-group" style="display:none">
                    <label>
                        A组日均流量（对照组）
                        <span class="tooltip tip-down" data-tip="对照组每天进入实验的用户数量。">ⓘ</span>
                    </label>
                    <input type="number" id="daily-na" min="1" step="1" placeholder="e.g. 5000">
                </div>
                <div class="form-group" id="daily-nb-group" style="display:none">
                    <label>
                        B组日均流量（实验组）
                        <span class="tooltip tip-down" data-tip="实验组每天进入实验的用户数量。">ⓘ</span>
                    </label>
                    <input type="number" id="daily-nb" min="1" step="1" placeholder="e.g. 5000">
                </div>
                <div class="form-group">
                    <label>
                        基准转化率 p₀ (%)
                        <span class="tooltip tip-down" data-tip="当前历史转化率，作为计算基准。填写百分比数值，如 60 代表 60%。">ⓘ</span>
                    </label>
                    <input type="number" id="p0" min="0.01" max="99.99" step="0.01" placeholder="e.g. 60">
                </div>
                <div class="form-group">
                    <label>
                        目标 MDE δ (%)
                        <span class="tooltip tip-down" data-tip="期望检测到的最小效应量（绝对百分点）。用于绘制「功效 vs 天数」曲线。留空则仅显示 MDE 曲线。">ⓘ</span>
                    </label>
                    <input type="number" id="delta" min="0.01" step="0.01" placeholder="可选，e.g. 5">
                </div>
                <div class="form-group">
                    <label>
                        显著性水平 α
                        <span class="tooltip tip-down" data-tip="误报率上限：当实验实际无效时，仍得出「有效」结论的最大概率。α = 0.05 表示最多接受 5% 的误报风险。α 越小，结论越保守，所需样本量越大。">ⓘ</span>
                    </label>
                    <select id="alpha">
                        <option value="0.05">0.05</option>
                        <option value="0.10">0.10</option>
                        <option value="0.20" selected>0.20</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        目标功效
                        <span class="tooltip tip-down" data-tip="MDE 曲线以此功效为计算标准；功效曲线中的参考线也取此值，交叉点即为「达标天数」。">ⓘ</span>
                    </label>
                    <select id="target-power">
                        <option value="0.70" selected>70%</option>
                        <option value="0.80">80%</option>
                        <option value="0.90">90%</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        最多观测天数
                        <span class="tooltip tip-down" data-tip="横轴最大天数，建议设为实验计划最长周期。">ⓘ</span>
                    </label>
                    <input type="number" id="max-days" min="2" max="365" step="1" value="28">
                </div>
            </div>
            <div class="action-row">
                <button class="btn btn-primary" onclick="run()">▶ 开始分析</button>
            </div>
        </div>

        <div class="validation-banner" id="validation-banner" role="alert" aria-live="polite" hidden></div>

        <div class="results-section" id="results">
            <div class="summary-grid" id="summary-grid"></div>
            <div class="chart-grid">
                <div class="chart-wrap">
                    <div class="chart-title">功效曲线</div>
                    <div class="chart-subtitle" id="power-subtitle"></div>
                    <div id="power-chart"></div>
                </div>
                <div class="chart-wrap">
                    <div class="chart-title">MDE 曲线</div>
                    <div class="chart-subtitle" id="mde-subtitle"></div>
                    <div id="mde-chart"></div>
                </div>
            </div>
            <div class="formula-section">
                <div class="formula-label">计算公式</div>
                <div class="formula-text" id="formula-text"></div>
            </div>
        </div>
    </div>

<script>
let scenario = 'monitoring';
let abTrafficMode = 'ratio';

function setTrafficMode(mode) {
    abTrafficMode = mode;
    document.getElementById('tab-ratio').classList.toggle('active', mode === 'ratio');
    document.getElementById('tab-direct').classList.toggle('active', mode === 'direct');
    document.getElementById('daily-n-group').style.display  = mode === 'ratio' ? '' : 'none';
    document.getElementById('split-group').style.display    = (mode === 'ratio' && scenario === 'ab-test') ? '' : 'none';
    document.getElementById('daily-na-group').style.display = mode === 'direct' ? '' : 'none';
    document.getElementById('daily-nb-group').style.display = mode === 'direct' ? '' : 'none';
    document.getElementById('results').classList.remove('visible');
}

function switchScenario(s) {
    scenario = s;
    document.querySelectorAll('.scenario-btn').forEach(btn => {
        const active = btn.dataset.scenario === s;
        btn.classList.toggle('active', active);
        btn.classList.toggle('ab', active && s === 'ab-test');
    });
    const badge = document.getElementById('scenario-badge');
    badge.className = 'scenario-badge ' + (s === 'ab-test' ? 'ab-test' : 'monitoring');
    badge.textContent = s === 'ab-test' ? '🧪 AB 测试（等比例分流）' : '📈 长期观测';
    document.getElementById('traffic-mode-row').classList.toggle('visible', s === 'ab-test');
    setTrafficMode(s === 'ab-test' ? abTrafficMode : 'ratio');
    document.getElementById('results').classList.remove('visible');
}

// ===== Statistical core =====

function erf(x) {
    const t = 1 / (1 + 0.3275911 * Math.abs(x));
    const p = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429))));
    return (x >= 0 ? 1 : -1) * (1 - p * Math.exp(-x * x));
}

function normCDF(z) { return 0.5 * (1 + erf(z / Math.SQRT2)); }

function normInv(p) {
    if (p <= 0 || p >= 1) return p <= 0 ? -Infinity : Infinity;
    const a = [-39.69683028665376, 220.9460984245205, -275.9285104469687, 138.357751867269, -30.66479806614716, 2.506628277459239];
    const b = [-54.47609879822406, 161.5858368580409, -155.6989798598866, 66.80131188771972, -13.28068155288572];
    const c = [-0.007784894002430293, -0.3223964580411365, -2.400758277161838, -2.549732539343734, 4.374664141464968, 2.938163982698783];
    const d = [0.007784695709041462, 0.3224671290700398, 2.445134137142996, 3.754408661907416];
    const pLow = 0.02425;
    let q, r;
    if (p < pLow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) / ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
    } else if (p <= 1 - pLow) {
        q = p - 0.5; r = q * q;
        return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q / (((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);
    } else {
        q = Math.sqrt(-2 * Math.log(1 - p));
        return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) / ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
    }
}

function variance(p) { return p * (1 - p); }

function getSplitRatio() {
    const [a, b] = document.getElementById('split-ratio').value.split(':').map(Number);
    return { rA: a, rB: b };
}

// Returns { nA, nB } per day
function nForDay(dailyN, day) {
    if (scenario !== 'ab-test') return { nA: dailyN * day, nB: dailyN * day };
    if (abTrafficMode === 'direct') {
        const na = parseFloat(document.getElementById('daily-na').value) || 0;
        const nb = parseFloat(document.getElementById('daily-nb').value) || 0;
        return { nA: na * day, nB: nb * day };
    }
    const total = dailyN * day;
    const { rA, rB } = getSplitRatio();
    return { nA: total * rA / (rA + rB), nB: total * rB / (rA + rB) };
}

// nA = control group n, nB = treatment group n
function calcPower(p0, delta, nA, nB, alpha) {
    const se = scenario === 'ab-test'
        ? Math.sqrt(variance(p0) / nA + variance(p0 + delta) / nB)
        : Math.sqrt(variance(p0) / nA);
    return normCDF(delta / se - normInv(1 - alpha / 2));
}

// MDE at target power (approximates pA≈pB≈p0 for AB)
function calcMDE(p0, nA, nB, alpha, power) {
    const z = normInv(1 - alpha / 2) + normInv(power);
    const se = scenario === 'ab-test'
        ? Math.sqrt(variance(p0) / nA + variance(p0) / nB)
        : Math.sqrt(variance(p0) / nA);
    return z * se;
}

// ===== Curve builders =====

function buildPowerCurve(dailyN, p0, delta, alpha, maxDays) {
    return Array.from({ length: maxDays }, (_, i) => {
        const { nA, nB } = nForDay(dailyN, i + 1);
        return { day: i + 1, value: Math.min(calcPower(p0, delta, nA, nB, alpha) * 100, 99.99) };
    });
}

function buildMDECurve(dailyN, p0, alpha, targetPower, maxDays) {
    return Array.from({ length: maxDays }, (_, i) => {
        const { nA, nB } = nForDay(dailyN, i + 1);
        return { day: i + 1, value: calcMDE(p0, nA, nB, alpha, targetPower) * 100 };
    });
}

function findCrossDay(curve, threshold) {
    const pt = curve.find(p => p.value >= threshold);
    return pt ? pt.day : null;
}

function findDropDay(curve, threshold) {
    const pt = curve.find(p => p.value <= threshold);
    return pt ? pt.day : null;
}

// ===== SVG Chart rendering =====

function renderChart(container, { curve, yLabel, yMin, yMax, thresholdY, thresholdLabel, markerDay, color }) {
    const W = 500, H = 260;
    const ml = 52, mr = 16, mt = 14, mb = 40;
    const cw = W - ml - mr, ch = H - mt - mb;
    const maxDay = curve[curve.length - 1].day;

    function px(day) {
        return maxDay <= 1 ? ml + cw / 2 : ml + (day - 1) / (maxDay - 1) * cw;
    }
    function py(v) {
        return mt + ch - (Math.min(Math.max(v, yMin), yMax) - yMin) / (yMax - yMin) * ch;
    }

    function xTicks() {
        const step = Math.max(1, Math.ceil(maxDay / 6));
        const ticks = [1];
        for (let t = step; t < maxDay; t += step) if (t > 1) ticks.push(t);
        if (ticks[ticks.length - 1] !== maxDay) ticks.push(maxDay);
        return ticks;
    }

    function yTicks() {
        const range = yMax - yMin;
        const candidates = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 25, 50];
        const step = candidates.find(s => range / s <= 7) || 50;
        const ticks = [];
        for (let t = Math.ceil(yMin / step) * step; t <= yMax + 1e-9; t = Math.round((t + step) * 1e8) / 1e8) {
            ticks.push(t);
        }
        return ticks;
    }

    function fmtTick(v) {
        if (v === 0) return '0';
        if (Math.abs(v) >= 10) return v.toFixed(0);
        if (Math.abs(v) >= 1) return v.toFixed(1);
        return v.toFixed(2);
    }

    const xt = xTicks(), yt = yTicks();
    let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

    // Grid
    for (const v of yt) {
        const yp = py(v);
        s += `<line x1="${ml}" y1="${yp}" x2="${ml+cw}" y2="${yp}" stroke="#1e2a38" stroke-width="1"/>`;
    }
    for (const d of xt) {
        const xp = px(d);
        s += `<line x1="${xp}" y1="${mt}" x2="${xp}" y2="${mt+ch}" stroke="#1e2a38" stroke-width="1"/>`;
    }

    // Threshold line
    if (thresholdY !== undefined && thresholdY >= yMin && thresholdY <= yMax) {
        const yp = py(thresholdY);
        s += `<line x1="${ml}" y1="${yp}" x2="${ml+cw}" y2="${yp}" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>`;
        const anchor = 'end';
        s += `<text x="${ml+cw-4}" y="${yp-5}" font-size="10" fill="#f59e0b" text-anchor="${anchor}" font-family="Noto Sans SC,sans-serif">${thresholdLabel}</text>`;
    }

    // Area fill
    const pts = curve.map(p => `${px(p.day)},${py(p.value)}`).join(' ');
    s += `<polygon points="${px(1)},${py(yMin)} ${pts} ${px(maxDay)},${py(yMin)}" fill="${color}" fill-opacity="0.08"/>`;

    // Data line
    s += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

    // Marker at crossing day
    if (markerDay !== undefined) {
        const pt = curve.find(p => p.day === markerDay);
        if (pt) {
            const mxp = px(markerDay), myp = py(pt.value);
            s += `<line x1="${mxp}" y1="${myp}" x2="${mxp}" y2="${mt+ch}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>`;
            s += `<circle cx="${mxp}" cy="${myp}" r="5" fill="${color}" stroke="#0a0e14" stroke-width="2"/>`;
            const anchor = mxp > ml + cw * 0.75 ? 'end' : 'start';
            const lx = anchor === 'start' ? mxp + 8 : mxp - 8;
            s += `<text x="${lx}" y="${myp - 9}" font-size="11" fill="${color}" text-anchor="${anchor}" font-family="Noto Sans SC,sans-serif" font-weight="500">第${markerDay}天</text>`;
        }
    }

    // Axes
    s += `<line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ch}" stroke="#3a4455" stroke-width="1.5"/>`;
    s += `<line x1="${ml}" y1="${mt+ch}" x2="${ml+cw}" y2="${mt+ch}" stroke="#3a4455" stroke-width="1.5"/>`;

    // Y-axis labels
    for (const v of yt) {
        const yp = py(v);
        s += `<text x="${ml-6}" y="${yp+4}" font-size="10" fill="#9ca3af" text-anchor="end" font-family="JetBrains Mono,monospace">${fmtTick(v)}</text>`;
    }

    // X-axis labels
    for (const d of xt) {
        const xp = px(d);
        s += `<text x="${xp}" y="${mt+ch+16}" font-size="10" fill="#9ca3af" text-anchor="middle" font-family="JetBrains Mono,monospace">${d}</text>`;
    }

    // Axis captions
    s += `<text x="${ml+cw/2}" y="${H-3}" font-size="10" fill="#6b7280" text-anchor="middle" font-family="Noto Sans SC,sans-serif">天数</text>`;
    s += `<text x="10" y="${mt+ch/2}" font-size="10" fill="#6b7280" text-anchor="middle" transform="rotate(-90 10 ${mt+ch/2})" font-family="Noto Sans SC,sans-serif">${yLabel}</text>`;

    // Crosshair + hit area (tooltip wired after DOM insert)
    s += `<g class="chart-crosshair" opacity="0">`;
    s += `<line class="crosshair-v" y1="${mt}" y2="${mt+ch}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>`;
    s += `<line class="crosshair-h" x1="${ml}" x2="${ml+cw}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>`;
    s += `<circle class="crosshair-dot" r="5" fill="${color}" stroke="#0a0e14" stroke-width="2"/>`;
    s += `</g>`;
    s += `<rect class="chart-hit-area" x="${ml}" y="${mt}" width="${cw}" height="${ch}" fill="transparent"/>`;

    s += `</svg>`;
    container.classList.add('chart-interactive');
    container.innerHTML = s + `<div class="chart-tooltip" aria-hidden="true"><div class="chart-tooltip-day"></div><div class="chart-tooltip-value"></div></div>`;

    const svg = container.querySelector('svg');
    const hitArea = svg.querySelector('.chart-hit-area');
    const crosshair = svg.querySelector('.chart-crosshair');
    const crossV = svg.querySelector('.crosshair-v');
    const crossH = svg.querySelector('.crosshair-h');
    const crossDot = svg.querySelector('.crosshair-dot');
    const tooltip = container.querySelector('.chart-tooltip');
    const tooltipDay = tooltip.querySelector('.chart-tooltip-day');
    const tooltipValue = tooltip.querySelector('.chart-tooltip-value');
    const valueLabel = yLabel.replace(/\s*\(%\)\s*$/, '');

    function dayFromSvgX(svgX) {
        if (maxDay <= 1) return 1;
        const t = (svgX - ml) / cw;
        return Math.min(maxDay, Math.max(1, Math.round(1 + t * (maxDay - 1))));
    }

    function svgPointFromEvent(e) {
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const ctm = svg.getScreenCTM();
        if (!ctm) return null;
        return pt.matrixTransform(ctm.inverse());
    }

    function showAtDay(day) {
        const pt = curve[day - 1];
        if (!pt) return;
        const xp = px(day), yp = py(pt.value);
        crossV.setAttribute('x1', xp);
        crossV.setAttribute('x2', xp);
        crossH.setAttribute('y1', yp);
        crossH.setAttribute('y2', yp);
        crossDot.setAttribute('cx', xp);
        crossDot.setAttribute('cy', yp);
        crosshair.setAttribute('opacity', '1');
        tooltipDay.textContent = `第 ${day} 天`;
        tooltipValue.textContent = `${valueLabel}：${pt.value.toFixed(2)}%`;
        tooltipValue.style.color = color;
        tooltip.classList.add('visible');
        tooltip.setAttribute('aria-hidden', 'false');

        const wrapRect = container.getBoundingClientRect();
        const svgRect = svg.getBoundingClientRect();
        const scaleX = svgRect.width / W;
        const scaleY = svgRect.height / H;
        const dotX = svgRect.left + xp * scaleX - wrapRect.left;
        const dotY = svgRect.top + yp * scaleY - wrapRect.top;
        const tipW = tooltip.offsetWidth || 120;
        const tipH = tooltip.offsetHeight || 48;
        let left = dotX + 12;
        let top = dotY - tipH - 8;
        if (left + tipW > container.clientWidth - 4) left = dotX - tipW - 12;
        if (left < 4) left = 4;
        if (top < 4) top = dotY + 12;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
    }

    function hideTooltip() {
        crosshair.setAttribute('opacity', '0');
        tooltip.classList.remove('visible');
        tooltip.setAttribute('aria-hidden', 'true');
    }

    function onPointerMove(e) {
        const sp = svgPointFromEvent(e);
        if (!sp || sp.x < ml || sp.x > ml + cw || sp.y < mt || sp.y > mt + ch) {
            hideTooltip();
            return;
        }
        showAtDay(dayFromSvgX(sp.x));
    }

    hitArea.addEventListener('mousemove', onPointerMove);
    hitArea.addEventListener('mouseleave', hideTooltip);
    hitArea.addEventListener('touchmove', e => {
        if (e.touches.length) { e.preventDefault(); onPointerMove(e.touches[0]); }
    }, { passive: false });
    hitArea.addEventListener('touchend', hideTooltip);
}

// ===== Main =====

function clearFieldError(input) {
    if (!input) return;
    input.classList.remove('input-error');
    input.removeAttribute('aria-invalid');
    const group = input.closest('.form-group') || input.parentElement;
    group?.querySelector('.field-error-msg')?.remove();
}

function clearValidation() {
    document.querySelectorAll('.input-error').forEach(clearFieldError);
    const banner = document.getElementById('validation-banner');
    if (banner) { banner.hidden = true; banner.innerHTML = ''; }
}

function setFieldError(inputId, message) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.classList.add('input-error');
    input.setAttribute('aria-invalid', 'true');
    const group = input.closest('.form-group') || input.parentElement;
    if (!group) return;
    let msg = group.querySelector('.field-error-msg');
    if (!msg) {
        msg = document.createElement('span');
        msg.className = 'field-error-msg';
        msg.setAttribute('role', 'alert');
        group.appendChild(msg);
    }
    msg.textContent = message;
}

function showValidationErrors(errors) {
    clearValidation();
    const unique = [];
    const seen = new Set();
    for (const err of errors) {
        const key = `${err.id || ''}:${err.message}`;
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(err);
    }
    let firstFocus = null;
    for (const err of unique) {
        if (err.id) {
            setFieldError(err.id, err.message);
            if (!firstFocus) firstFocus = document.getElementById(err.id);
        }
    }
    const banner = document.getElementById('validation-banner');
    if (banner) {
        banner.hidden = false;
        banner.innerHTML = unique.map(e => `<div>⚠ ${e.message}</div>`).join('');
    }
    document.getElementById('results').classList.remove('visible');
    const scrollBehavior = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'instant' : 'smooth';
    const target = firstFocus || banner;
    if (firstFocus) firstFocus.focus({ preventScroll: true });
    target?.scrollIntoView({ behavior: scrollBehavior, block: 'center' });
    return false;
}

function run() {
    clearValidation();
    const dailyN  = parseFloat(document.getElementById('daily-n').value);
    const dailyNa = parseFloat(document.getElementById('daily-na').value);
    const dailyNb = parseFloat(document.getElementById('daily-nb').value);
    const p0Raw   = parseFloat(document.getElementById('p0').value);
    const deltaRaw = parseFloat(document.getElementById('delta').value);
    const alpha   = parseFloat(document.getElementById('alpha').value);
    const targetPower = parseFloat(document.getElementById('target-power').value);
    const maxDays = parseInt(document.getElementById('max-days').value);

    const isDirect = scenario === 'ab-test' && abTrafficMode === 'direct';
    const errors = [];
    if (!isDirect && (!dailyN || dailyN < 1)) errors.push({ id: 'daily-n', message: '请填写有效的日均流量' });
    if (isDirect) {
        if (!dailyNa || dailyNa < 1) errors.push({ id: 'daily-na', message: '请填写有效的 A 组日均流量' });
        if (!dailyNb || dailyNb < 1) errors.push({ id: 'daily-nb', message: '请填写有效的 B 组日均流量' });
    }
    if (!p0Raw || p0Raw <= 0 || p0Raw >= 100) errors.push({ id: 'p0', message: '基准转化率需在 0%–100% 之间' });
    if (!maxDays || maxDays < 2) errors.push({ id: 'max-days', message: '最多观测天数至少为 2' });

    const p0 = p0Raw / 100;
    const delta = (!isNaN(deltaRaw) && deltaRaw > 0) ? deltaRaw / 100 : null;

    if (delta && p0 > 0 && p0 < 1 && p0 + delta >= 1) errors.push({ id: 'delta', message: 'p₀ + δ 超出 100%，请调整参数' });

    if (errors.length) return showValidationErrors(errors);

    // effective dailyN for nForDay (only used in ratio mode; direct mode reads fields directly)
    const effectiveDailyN = isDirect ? 1 : dailyN;

    const targetPowerPct = Math.round(targetPower * 100);

    // Build curves
    const mdeCurve   = buildMDECurve(effectiveDailyN, p0, alpha, targetPower, maxDays);
    const powerCurve = delta ? buildPowerCurve(effectiveDailyN, p0, delta, alpha, maxDays) : null;

    const mdeAt1   = mdeCurve[0].value;
    const mdeAtMax = mdeCurve[maxDays - 1].value;
    const crossDay    = powerCurve ? findCrossDay(powerCurve, targetPower * 100) : null;
    const powerAtMax  = powerCurve ? powerCurve[maxDays - 1].value : null;
    const mdeDropDay  = delta ? findDropDay(mdeCurve, delta * 100) : null;

    // Summary stats
    let html = '';
    if (delta) {
        const reachable = crossDay !== null;
        html += `<div class="stat-card">
            <div class="stat-label">达到 ${targetPowerPct}% 功效所需天数</div>
            <div class="stat-value ${reachable ? 'good' : 'warn'}">${reachable ? crossDay : '&gt;' + maxDays}<span class="stat-unit">天</span></div>
            <div class="stat-note">δ = ${deltaRaw.toFixed(2)}%，α = ${alpha}</div>
        </div>`;
        html += `<div class="stat-card">
            <div class="stat-label">第 ${maxDays} 天的统计功效</div>
            <div class="stat-value ${powerAtMax >= targetPower * 100 ? 'good' : 'warn'}">${powerAtMax.toFixed(1)}<span class="stat-unit">%</span></div>
            <div class="stat-note">δ = ${deltaRaw.toFixed(2)}%，α = ${alpha}</div>
        </div>`;
    }
    html += `<div class="stat-card">
        <div class="stat-label">第 ${maxDays} 天可检测 MDE</div>
        <div class="stat-value">${mdeAtMax.toFixed(2)}<span class="stat-unit">%</span></div>
        <div class="stat-note">功效 ${targetPowerPct}%，α = ${alpha}</div>
    </div>`;
    const { nA: nA1, nB: nB1 } = nForDay(effectiveDailyN, 1);
    const groupNote = scenario === 'ab-test'
        ? `A组 ${Math.round(nA1).toLocaleString()} 人 / B组 ${Math.round(nB1).toLocaleString()} 人`
        : `${Math.round(nA1).toLocaleString()} 人`;
    html += `<div class="stat-card">
        <div class="stat-label">第 1 天 MDE（单日流量）</div>
        <div class="stat-value">${mdeAt1.toFixed(2)}<span class="stat-unit">%</span></div>
        <div class="stat-note">${groupNote}</div>
    </div>`;
    document.getElementById('summary-grid').innerHTML = html;

    // Power chart
    const powerEl = document.getElementById('power-chart');
    if (powerCurve) {
        renderChart(powerEl, {
            curve: powerCurve,
            yLabel: '功效 (%)', yMin: 0, yMax: 100,
            thresholdY: targetPower * 100,
            thresholdLabel: `${targetPowerPct}%`,
            markerDay: crossDay,
            color: '#10b981'
        });
        document.getElementById('power-subtitle').textContent = `δ = ${deltaRaw.toFixed(2)}%，α = ${alpha}`;
    } else {
        powerEl.innerHTML = `<div class="chart-empty">填写目标 MDE δ 以显示功效曲线</div>`;
        document.getElementById('power-subtitle').textContent = '';
    }

    // MDE chart
    const mdeYMax = Math.max(mdeAt1 * 1.15, delta ? delta * 100 * 1.25 : 0);
    renderChart(document.getElementById('mde-chart'), {
        curve: mdeCurve,
        yLabel: 'MDE (%)', yMin: 0, yMax: mdeYMax,
        thresholdY: delta ? delta * 100 : undefined,
        thresholdLabel: delta ? `δ = ${deltaRaw.toFixed(2)}%` : undefined,
        markerDay: mdeDropDay,
        color: '#06b6d4'
    });
    document.getElementById('mde-subtitle').textContent = `目标功效 ${targetPowerPct}%，α = ${alpha}`;

    // Formula
    const za = normInv(1 - alpha / 2).toFixed(3);
    const zb = normInv(targetPower).toFixed(3);
    const isAB = scenario === 'ab-test';
    let nDesc;
    if (!isAB) {
        nDesc = 'n = 日均流量 × 天数';
    } else if (abTrafficMode === 'direct') {
        nDesc = `n<sub>A</sub> = ${Math.round(dailyNa).toLocaleString()} × 天数，n<sub>B</sub> = ${Math.round(dailyNb).toLocaleString()} × 天数`;
    } else {
        const { rA, rB } = getSplitRatio();
        nDesc = `n<sub>A</sub> = 日均流量 × ${rA}/${rA+rB} × 天数，n<sub>B</sub> = 日均流量 × ${rB}/${rA+rB} × 天数`;
    }
    document.getElementById('formula-text').innerHTML =
        `<strong>${isAB ? 'AB 测试' : '长期观测（单样本）'}</strong><br>
        ${nDesc}<br>
        SE = ${isAB ? '√( p₀(1−p₀)/n<sub>A</sub> + p₁(1−p₁)/n<sub>B</sub> )，p₁ = p₀ + δ' : '√( p₀(1−p₀)/n )'}<br>
        功效 = Φ( δ/SE − z<sub>α/2</sub> )，其中 z<sub>α/2</sub> = ${za}<br>
        MDE（功效 ${targetPowerPct}%）= (z<sub>α/2</sub> + z<sub>β</sub>) × SE = (${za} + ${zb}) × SE`;

    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (typeof gtag !== 'undefined') {
        gtag('event', 'run_power_analysis', { event_category: 'power_analysis', scenario });
    }
}
</script>
