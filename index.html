<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URS DS Tools</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVLVZCEG29"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KVLVZCEG29');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #141a22;
            --bg-tertiary: #1c242e;
            --bg-card: #151c25;
            --border-color: #2a3441;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --shadow: 0 4px 32px rgba(0,0,0,0.5);
            --glow-blue: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; line-height: 1.7;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
                              radial-gradient(ellipse at 90% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 24px 64px; }

        /* Header */
        header { text-align: center; margin-bottom: 56px; }
        .brand-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px;
            border-radius: 20px; font-size: 0.78rem; font-weight: 500; margin-bottom: 20px;
            background: rgba(59,130,246,0.12); color: var(--accent-cyan);
            border: 1px solid rgba(59,130,246,0.25); letter-spacing: 0.04em;
        }
        h1 {
            font-size: 3rem; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.01em;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-secondary); font-size: 1.05rem; }

        /* Section label */
        .section-title {
            display: flex; align-items: center; gap: 12px;
            font-size: 1rem; font-weight: 600; color: var(--text-secondary);
            margin-bottom: 22px; text-transform: uppercase; letter-spacing: 0.08em;
        }
        .section-title::before { content: ''; width: 4px; height: 18px; background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple)); border-radius: 2px; }

        /* Tools grid */
        .tools-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;
        }

        /* Tool card */
        .tool-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px;
            padding: 28px; position: relative; overflow: hidden; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; min-height: 220px;
            transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
        }
        .tool-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.5), transparent);
        }
        .tool-card.active:hover {
            transform: translateY(-6px); border-color: var(--accent-blue); box-shadow: var(--shadow), var(--glow-blue);
        }
        .tool-card.active:hover .card-arrow { transform: translateX(4px); color: var(--accent-cyan); }

        .card-icon {
            width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 1.6rem; margin-bottom: 20px;
        }
        .card-icon.blue { background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(6,182,212,0.22)); }
        .card-icon.purple { background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(236,72,153,0.18)); }
        .card-icon.green { background: linear-gradient(135deg, rgba(16,185,129,0.22), rgba(6,182,212,0.18)); }
        .card-icon.muted { background: var(--bg-tertiary); }

        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
        .card-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; flex: 1; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 4px; }
        .card-tag {
            font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
            background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border-color);
        }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-color);
        }
        .card-action { font-size: 0.85rem; font-weight: 500; color: var(--accent-blue); }
        .card-arrow { font-size: 1.1rem; color: var(--accent-blue); transition: transform 0.25s, color 0.25s; }

        /* Coming soon card */
        .tool-card.soon { opacity: 0.55; cursor: default; }
        .tool-card.soon .card-icon { color: var(--text-muted); }
        .tool-card.soon .card-action { color: var(--text-muted); }
        .soon-badge {
            position: absolute; top: 18px; right: 18px; font-size: 0.68rem; font-weight: 500;
            padding: 3px 10px; border-radius: 12px; background: var(--bg-tertiary);
            color: var(--text-muted); border: 1px solid var(--border-color);
        }

        .watermark {
            position: fixed; bottom: 16px; right: 20px;
            font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;
            letter-spacing: 0.02em; pointer-events: none; z-index: 100;
        }

        @media (max-width: 768px) {
            .container { padding: 56px 16px 56px; }
            h1 { font-size: 2.25rem; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="watermark">URS数据科学团队 © 2026</div>

    <div class="container">
        <header>
            <div class="brand-badge">◆ URS DATA SCIENCE</div>
            <h1>URS DS Tools</h1>
            <p class="subtitle">URS 数据科学团队 · 工具集</p>
        </header>

        <div class="section-title">工具</div>
        <div class="tools-grid">
            <!-- Sample Size Calculator -->
            <a class="tool-card active" href="sample-size-calculator.html">
                <div class="card-icon blue">📊</div>
                <div class="card-title">样本量计算器</div>
                <div class="card-desc">基于统计检验的样本量估算工具，支持精度与样本量双向推算。</div>
                <div class="card-tags">
                    <span class="card-tag">长期观测</span>
                    <span class="card-tag">AB 测试</span>
                    <span class="card-tag">比例 / 均值</span>
                </div>
                <div class="card-footer">
                    <span class="card-action">进入工具</span>
                    <span class="card-arrow">→</span>
                </div>
            </a>

            <!-- Significance Test -->
            <a class="tool-card active" href="significance-test.html">
                <div class="card-icon purple">🧮</div>
                <div class="card-title">显著性检验</div>
                <div class="card-desc">单/双样本 z 比例检验，森林图可视化，支持本地 CSV 数据导入。</div>
                <div class="card-tags">
                    <span class="card-tag">单样本</span>
                    <span class="card-tag">双样本</span>
                    <span class="card-tag">森林图</span>
                    <span class="card-tag">CSV</span>
                </div>
                <div class="card-footer">
                    <span class="card-action">进入工具</span>
                    <span class="card-arrow">→</span>
                </div>
            </a>

            <!-- Power Analysis -->
            <a class="tool-card active" href="power-analysis.html">
                <div class="card-icon green">📈</div>
                <div class="card-title">功效分析</div>
                <div class="card-desc">输入实验流量与效应量，查看统计功效与可检测 MDE 如何随天数增长。</div>
                <div class="card-tags">
                    <span class="card-tag">长期观测</span>
                    <span class="card-tag">AB 测试</span>
                    <span class="card-tag">功效曲线</span>
                    <span class="card-tag">MDE 曲线</span>
                </div>
                <div class="card-footer">
                    <span class="card-action">进入工具</span>
                    <span class="card-arrow">→</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
